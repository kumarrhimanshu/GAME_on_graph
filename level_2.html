<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict Chain Graph Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; }
        #game-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        svg { width: 100%; height: auto; display: block; }
        .node { cursor: pointer; transition: 0.2s; }
        .node:hover circle { filter: brightness(0.9); }
    </style>
</head>
<body>

<div id="game-container">
    <h1 class="text-2xl font-bold text-center mb-4">Strict Chain Graph: t-Partition Challenge</h1>
    <div class="bg-slate-100 p-4 rounded-lg flex justify-center items-center gap-6 mb-4">
        <input type="number" id="input-t" value="4" min="2" max="6" class="w-20 p-2 border rounded">
        <button id="btn-generate" class="bg-indigo-600 text-white px-6 py-2 rounded font-bold">Generate Graph</button>
    </div>
    <div id="status-box" class="bg-blue-100 border-l-4 border-blue-500 p-4 mb-4 font-bold rounded shadow-inner text-center">Setup: Place guards.</div>
    <div class="flex justify-center gap-4 mb-4">
        <button id="btn-start" class="bg-emerald-500 text-white py-2 px-6 rounded font-bold">Lock Guards & Start</button>
        <button id="btn-reset" class="bg-slate-500 text-white py-2 px-6 rounded font-bold">Reset</button>
    </div>
    <svg id="graph-svg" viewBox="0 0 800 600" class="border rounded bg-white"></svg>
</div>

<script>
    let nodes = []; let edges = []; let guards = new Set();
    let phase = 1; let maxGuardsAllowed = 0; let attackedEdge = null; let selectedGuard = null;

    function generateStrictChain() {
        nodes = []; edges = []; guards.clear(); phase = 1; attackedEdge = null; selectedGuard = null;
        let t = parseInt(document.getElementById('input-t').value);
        maxGuardsAllowed = Math.ceil((2 * t) / 3);
        
        for(let i=0; i<t; i++) {
            nodes.push({ id: `x${i+1}`, x: 250, y: 100 + (i * 80) });
            nodes.push({ id: `y${i+1}`, x: 550, y: 100 + (i * 80) });
        }
        for(let i=0; i<t; i++) {
            for(let j=0; j<=i; j++) {
                edges.push({ u: `x${i+1}`, v: `y${j+1}` });
            }
        }
        updateStatus(); draw();
    }

    function draw() {
        const svg = document.getElementById('graph-svg');
        svg.innerHTML = '';
        const t = parseInt(document.getElementById('input-t').value);

        // Draw Ovals
        [250, 550].forEach(cx => {
            const el = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            el.setAttribute("cx", cx); el.setAttribute("cy", 100 + ((t-1)*80)/2);
            el.setAttribute("rx", 60); el.setAttribute("ry", (t*45));
            el.setAttribute("fill", "transparent"); el.setAttribute("stroke", "#94a3b8");
            el.setAttribute("stroke-dasharray", "8,8");
            svg.appendChild(el);
        });

        // Draw Edges
        edges.forEach(e => {
            const n1 = nodes.find(n => n.id === e.u), n2 = nodes.find(n => n.id === e.v);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
            line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
            line.setAttribute("stroke", (attackedEdge?.u === e.u && attackedEdge?.v === e.v) ? "red" : "#cbd5e1");
            line.setAttribute("stroke-width", "3");
            line.onclick = () => { if(phase===2) { attackedEdge = e; phase=3; updateStatus(); draw(); } };
            svg.appendChild(line);
        });

        // Draw Nodes
        nodes.forEach(n => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", n.x); circle.setAttribute("cy", n.y);
            circle.setAttribute("r", 20);
            circle.setAttribute("fill", guards.has(n.id) ? "#fbbf24" : "#93c5fd");
            g.onclick = () => {
                if(phase === 1) { guards.has(n.id) ? guards.delete(n.id) : (guards.size < maxGuardsAllowed && guards.add(n.id)); }
                else if(phase === 3 && guards.has(n.id)) { selectedGuard = n.id; }
                else if(phase === 3 && selectedGuard && (n.id === attackedEdge.u || n.id === attackedEdge.v)) {
                    guards.delete(selectedGuard); guards.add(n.id); phase = 2; attackedEdge = null; selectedGuard = null;
                }
                draw(); updateStatus();
            };
            g.appendChild(circle);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", n.x); text.setAttribute("y", n.y + 5);
            text.setAttribute("text-anchor", "middle"); text.setAttribute("font-size", "12"); text.textContent = n.id;
            g.appendChild(text); svg.appendChild(g);
        });
    }

    function updateStatus() {
        const box = document.getElementById('status-box');
        if(phase === 1) box.innerText = `Setup: Place ${maxGuardsAllowed} guards.`;
        else if(phase === 2) box.innerText = "Attacker: Click an edge!";
        else if(phase === 3) box.innerText = "Defender: Select your guard, then click target node.";
    }

    document.getElementById('btn-generate').onclick = generateStrictChain;
    document.getElementById('btn-start').onclick = () => { if(guards.size === maxGuardsAllowed) { phase=2; updateStatus(); } };
    document.getElementById('btn-reset').onclick = generateStrictChain;
    generateStrictChain();
</script>
</body>
</html>
