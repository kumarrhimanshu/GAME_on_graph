<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Graph Defense Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        #game-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 20px; }
        svg { width: 100%; height: auto; display: block; user-select: none; }
        .node { cursor: pointer; transition: all 0.2s; }
        .node:hover circle { filter: brightness(0.9); }
        .edge { cursor: pointer; transition: stroke-width 0.2s, stroke 0.2s; }
        .edge:hover { stroke-width: 6; stroke: #ff7f50; }
        .bg-ellipse { fill: transparent; stroke: black; stroke-width: 2; pointer-events: none; }
        
        /* Custom animation for Game Over */
        @keyframes pulse-red {
            0%, 100% { background-color: #fee2e2; }
            50% { background-color: #fca5a5; }
        }
        .animate-gameover { animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; border-color: #b91c1c; color: #7f1d1d; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="mb-4 text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Eternal Edge Defense: Level 3 Chain Graph</h1>
        <div id="status-box" class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 rounded text-lg font-semibold shadow-inner min-h-[4rem] flex items-center justify-center">
            Phase 1: SETUP - Click nodes to place your guards.
        </div>
    </div>

    <div class="flex justify-center gap-4 mb-4">
        <button id="btn-start" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded shadow transition">Lock Guards & Start Game</button>
        <button id="btn-reset" class="bg-slate-500 hover:bg-slate-600 text-white font-bold py-2 px-6 rounded shadow transition">Reset Game</button>
    </div>

    <div class="border-2 border-slate-200 rounded-lg overflow-hidden bg-white">
        <!-- Expanded viewBox to fit 3 tiers vertically -->
        <svg id="graph-svg" viewBox="0 0 800 1000"></svg>
    </div>
</div>

<script>
    // --- Graph Data ---
    const nodes = [
        // U1 (3 nodes)
        { id: 0, x: 200, y: 100 }, { id: 1, x: 200, y: 180 }, { id: 2, x: 200, y: 260 },
        // U2 (2 nodes)
        { id: 3, x: 200, y: 400 }, { id: 4, x: 200, y: 480 },
        // U3 (4 nodes)
        { id: 5, x: 200, y: 620 }, { id: 6, x: 200, y: 700 }, { id: 7, x: 200, y: 780 }, { id: 8, x: 200, y: 860 },
        
        // V1 (2 nodes)
        { id: 9, x: 600, y: 140 }, { id: 10, x: 600, y: 220 },
        // V2 (3 nodes)
        { id: 11, x: 600, y: 360 }, { id: 12, x: 600, y: 440 }, { id: 13, x: 600, y: 520 },
        // V3 (3 nodes)
        { id: 14, x: 600, y: 660 }, { id: 15, x: 600, y: 740 }, { id: 16, x: 600, y: 820 }
    ];

    // Generate edges algorithmically based on Chain Graph rules
    const edges = [];
    const addEdges = (uList, vList) => {
        uList.forEach(u => vList.forEach(v => edges.push({u, v})));
    };
    
    const U1 = [0, 1, 2], U2 = [3, 4], U3 = [5, 6, 7, 8];
    const V1 = [9, 10], V2 = [11, 12, 13], V3 = [14, 15, 16];

    // Nested neighborhoods
    addEdges(U1, V1);
    addEdges(U2, V1); addEdges(U2, V2);
    addEdges(U3, V1); addEdges(U3, V2); addEdges(U3, V3);

    // --- Game State ---
    let phase = 1; // 1: Setup, 2: Attack, 3: Defend, 4: Game Over
    let guards = new Set();
    let attackedEdge = null;
    let selectedGuard = null;

    const svg = document.getElementById('graph-svg');
    const statusBox = document.getElementById('status-box');

    // --- Helpers ---
    function setStatus(msg, type="blue") {
        const baseClasses = "border-l-4 p-4 rounded text-lg font-semibold shadow-inner min-h-[4rem] flex items-center justify-center transition-colors duration-300";
        let colorClasses = "";
        
        if (type === "blue") colorClasses = "bg-blue-100 border-blue-500 text-blue-700";
        else if (type === "green") colorClasses = "bg-green-100 border-green-500 text-green-700";
        else if (type === "red") colorClasses = "bg-red-100 border-red-500 text-red-700";
        else if (type === "slate") colorClasses = "bg-slate-100 border-slate-500 text-slate-700";
        else if (type === "gameover") colorClasses = "border-red-800 text-red-900 animate-gameover";

        statusBox.className = `${baseClasses} ${colorClasses}`;
        statusBox.innerText = msg;
    }

    function areAdjacent(u, v) {
        return edges.some(e => (e.u === u && e.v === v) || (e.u === v && e.v === u));
    }

    // --- Render Loop ---
    function draw() {
        svg.innerHTML = ''; // Clear SVG

        // 1. Draw Background Ellipses (Nested Clusters)
        const bgShapes = [
            // Outer ellipses encompassing all 3 levels
            { cx: 200, cy: 480, rx: 80, ry: 460 }, // U Outer
            { cx: 600, cy: 480, rx: 80, ry: 460 }, // V Outer
            // Inner ellipses
            { cx: 200, cy: 180, rx: 50, ry: 120 }, // U1
            { cx: 200, cy: 440, rx: 50, ry: 80 },  // U2
            { cx: 200, cy: 740, rx: 50, ry: 160 }, // U3
            { cx: 600, cy: 180, rx: 50, ry: 80 },  // V1
            { cx: 600, cy: 440, rx: 50, ry: 120 }, // V2
            { cx: 600, cy: 740, rx: 50, ry: 120 }  // V3
        ];
        
        bgShapes.forEach(shape => {
            const el = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            el.setAttribute("cx", shape.cx); el.setAttribute("cy", shape.cy);
            el.setAttribute("rx", shape.rx); el.setAttribute("ry", shape.ry);
            el.setAttribute("class", "bg-ellipse");
            svg.appendChild(el);
        });

        // 2. Draw Edges
        edges.forEach((edge) => {
            const n1 = nodes.find(n => n.id === edge.u);
            const n2 = nodes.find(n => n.id === edge.v);
            
            const isAttacked = attackedEdge && (attackedEdge.u === edge.u && attackedEdge.v === edge.v);
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
            line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
            
            if (isAttacked) {
                line.setAttribute("stroke", phase === 4 ? "#991b1b" : "#ef4444"); // Darker red on game over
                line.setAttribute("stroke-width", "8");
            } else {
                line.setAttribute("stroke", "#cbd5e1"); // Slate-300
                line.setAttribute("stroke-width", "2"); 
                line.setAttribute("class", "edge");
            }

            // Edge Click Event (Attacker)
            line.addEventListener('click', () => {
                if (phase === 2) {
                    attackedEdge = edge;
                    
                    // Check if already defended
                    if (guards.has(edge.u) || guards.has(edge.v)) {
                        setStatus(`Attacker hit edge (${edge.u}, ${edge.v}). Automatically DEFENDED!`, "green");
                        attackedEdge = null; // Flash effect then clear
                        setTimeout(draw, 1000);
                    } else {
                        // --- GAME OVER LOGIC CHECK ---
                        // Does the defender have any legal move?
                        let canDefend = false;
                        guards.forEach(g => {
                            // A guard can defend if it is adjacent to EITHER endpoint of the attacked edge
                            if (areAdjacent(g, edge.u) || areAdjacent(g, edge.v)) {
                                canDefend = true;
                            }
                        });

                        if (!canDefend) {
                            phase = 4; // GAME OVER Phase
                            setStatus(`GAME OVER! No guard can reach edge (${edge.u}, ${edge.v}). ATTACKER WINS!`, "gameover");
                        } else {
                            phase = 3; // Continue to Defend Phase
                            setStatus(`Attacker hit edge (${edge.u}, ${edge.v})! DEFENDER: Select a guard to slide.`, "red");
                        }
                    }
                    draw();
                }
            });

            // Draw attacked edges on top
            if (isAttacked) {
                svg.appendChild(line);
            } else {
                svg.prepend(line);
            }
        });

        // 3. Draw Nodes
        nodes.forEach(node => {
            const isGuard = guards.has(node.id);
            const isSelected = selectedGuard === node.id;
            const isAttackedEndpoint = attackedEdge && (attackedEdge.u === node.id || attackedEdge.v === node.id);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node");
            g.setAttribute("transform", `translate(${node.x}, ${node.y})`);

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("r", isGuard ? "22" : "18");
            
            // Coloring logic
            if (isGuard) {
                circle.setAttribute("fill", phase === 4 ? "#b45309" : "#fbbf24"); // Darker gold on game over
                circle.setAttribute("stroke", isSelected ? "#000000" : "#78350f");
                circle.setAttribute("stroke-width", isSelected ? "4" : "2");
                if (isSelected) circle.setAttribute("stroke-dasharray", "4,4");
            } else {
                circle.setAttribute("fill", "#93c5fd"); // Light blue
                circle.setAttribute("stroke", isAttackedEndpoint && phase === 3 ? "#ef4444" : "#2563eb");
                circle.setAttribute("stroke-width", isAttackedEndpoint && phase === 3 ? "4" : "2");
            }

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("dy", ".3em");
            text.setAttribute("font-weight", "bold");
            text.setAttribute("fill", isGuard ? (phase === 4 ? "#fed7aa" : "#000") : "#1e3a8a");
            text.textContent = node.id;

            // Node Click Event (Defender)
            g.addEventListener('click', () => {
                if (phase === 1) {
                    // Setup Phase: Toggle guards
                    if (guards.has(node.id)) guards.delete(node.id);
                    else guards.add(node.id);
                    draw();
                } 
                else if (phase === 3) {
                    // Defend Phase
                    if (guards.has(node.id)) {
                        selectedGuard = selectedGuard === node.id ? null : node.id;
                        draw();
                    } 
                    else if (selectedGuard !== null) {
                        // Check if move is valid
                        if (!isAttackedEndpoint) {
                            setStatus("Invalid! Guard must move to one of the attacked endpoints.", "red");
                            return;
                        }
                        if (!areAdjacent(selectedGuard, node.id)) {
                            setStatus("Invalid! Guard must slide along an existing edge.", "red");
                            return;
                        }
                        
                        // Execute Move
                        guards.delete(selectedGuard);
                        guards.add(node.id);
                        attackedEdge = null;
                        selectedGuard = null;
                        phase = 2;
                        setStatus("Defense successful! Attacker, choose next edge.", "green");
                        draw();
                    }
                }
            });

            g.appendChild(circle);
            g.appendChild(text);
            svg.appendChild(g);
        });
    }

    // --- Buttons ---
    document.getElementById('btn-start').addEventListener('click', () => {
        if (phase === 1) {
            if (guards.size === 0) {
                alert("Please place at least one guard before starting!");
                return;
            }
            phase = 2;
            document.getElementById('btn-start').classList.add("opacity-50", "cursor-not-allowed");
            setStatus("Game Started! ATTACKER: Click an edge to attack.", "slate");
            draw();
        }
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        phase = 1;
        guards.clear();
        attackedEdge = null;
        selectedGuard = null;
        document.getElementById('btn-start').classList.remove("opacity-50", "cursor-not-allowed");
        setStatus("Phase 1: SETUP - Click nodes to place your guards.", "blue");
        draw();
    });

    // Initial render
    draw();
</script>

</body>
</html>
